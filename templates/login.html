<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toner Monitor Admin</title>
    <style>
        :root {
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-700: #404040;
            --gray-900: #171717;
        }
        
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--gray-100);
        }
        
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 2rem;
        }
        
        .login-card {
            background: var(--white);
            padding: 2rem;
            border: 1px solid var(--gray-200);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .login-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
        }
        
        .login-header p {
            color: var(--gray-400);
            font-size: 0.875rem;
            margin: 0;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.25rem;
        }
        
        input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gray-900);
        }
        
        button {
            width: 100%;
            padding: 0.625rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: var(--gray-900);
            color: var(--white);
            border: none;
            cursor: pointer;
        }
        
        button:hover {
            background: var(--gray-700);
        }
        
        .alert-error {
            background: var(--gray-100);
            border-left: 3px solid var(--gray-900);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Toner Monitor</h1>
                <p>Admin Panel</p>
            </div>
            
            {% if error %}
            <div class="alert-error">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/admin/login">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required autofocus>
                
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
                
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
