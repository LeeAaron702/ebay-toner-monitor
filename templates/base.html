<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - Toner Monitor</title>
    
    <!-- HTMX for interactivity -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        /* ============================================
           BLACK & WHITE UTILITARIAN DESIGN SYSTEM
           Inspired by Apple Numbers / Excel
           ============================================ */
        
        :root {
            /* Grayscale palette */
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --black: #000000;
            
            /* Semantic colors */
            --bg: var(--white);
            --bg-secondary: var(--gray-50);
            --border: var(--gray-200);
            --border-strong: var(--gray-300);
            --text: var(--gray-900);
            --text-secondary: var(--gray-500);
            --text-muted: var(--gray-400);
            
            /* Typography scale (1.25 ratio) */
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 2rem;
            
            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
        }
        
        /* Reset & Base */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: var(--text-base);
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
        }
        
        h1, h2, h3, h4, h5, h6 {
            margin: 0 0 var(--space-4) 0;
            font-weight: 600;
            line-height: 1.25;
        }
        
        h1 { font-size: var(--text-2xl); }
        h2 { font-size: var(--text-xl); }
        h3 { font-size: var(--text-lg); }
        
        p { margin: 0 0 var(--space-4) 0; }
        
        a {
            color: var(--text);
            text-decoration: underline;
        }
        
        a:hover {
            color: var(--gray-600);
        }
        
        /* Layout */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 200px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: var(--space-4);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            padding-bottom: var(--space-3);
            margin-bottom: var(--space-4);
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .sidebar nav li {
            margin-bottom: var(--space-1);
        }
        
        .sidebar nav a {
            display: block;
            padding: var(--space-2) var(--space-3);
            font-size: var(--text-sm);
            text-decoration: none;
            color: var(--text-secondary);
            border-radius: 3px;
        }
        
        .sidebar nav a:hover {
            color: var(--text);
            background: var(--gray-200);
        }
        
        .sidebar nav a.active {
            color: var(--white);
            background: var(--gray-900);
        }
        
        .sidebar .section-label {
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-top: var(--space-6);
            margin-bottom: var(--space-2);
            padding-left: var(--space-3);
        }
        
        /* Main content */
        .main-content {
            flex: 1;
            margin-left: 200px;
            padding: var(--space-6);
            background: var(--bg);
            min-height: 100vh;
        }
        
        /* Page header */
        .page-header {
            margin-bottom: var(--space-6);
        }
        
        .page-header h1 {
            margin-bottom: var(--space-1);
        }
        
        .page-header p {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin: 0;
        }
        
        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
        
        .stat-card {
            background: var(--bg);
            padding: var(--space-4);
            border: 1px solid var(--border);
        }
        
        .stat-card h3 {
            font-size: var(--text-xs);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }
        
        .stat-card .value {
            font-size: var(--text-2xl);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }
        
        .stat-card .subtext {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: var(--space-1);
        }
        
        .stat-card--primary .value {
            font-size: var(--text-3xl);
        }
        
        /* Section divider */
        .section {
            margin-bottom: var(--space-8);
        }
        
        .section-title {
            font-size: var(--text-xs);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
            padding-bottom: var(--space-2);
            border-bottom: 1px solid var(--border);
        }
        
        /* Tables - Excel-like */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }
        
        th, td {
            padding: var(--space-2) var(--space-3);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            background: var(--gray-100);
            font-weight: 500;
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-secondary);
        }
        
        tr:hover {
            background: var(--gray-50);
        }
        
        .actions-cell {
            white-space: nowrap;
        }
        
        /* Badges - monochrome */
        .badge {
            display: inline-block;
            padding: var(--space-1) var(--space-2);
            font-size: var(--text-xs);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border: 1px solid var(--border-strong);
            background: var(--bg);
        }
        
        .badge-canon,
        .badge-xerox,
        .badge-lexmark {
            background: var(--bg);
            color: var(--text);
            border-color: var(--gray-400);
        }
        
        .badge-active {
            background: var(--gray-900);
            color: var(--white);
            border-color: var(--gray-900);
        }
        
        .badge-inactive {
            background: var(--bg);
            color: var(--text-muted);
            border-style: dashed;
        }
        
        /* Buttons */
        button, [role="button"], .btn {
            display: inline-block;
            padding: var(--space-2) var(--space-4);
            font-size: var(--text-sm);
            font-weight: 500;
            text-decoration: none;
            background: var(--gray-900);
            color: var(--white);
            border: 1px solid var(--gray-900);
            cursor: pointer;
        }
        
        button:hover, [role="button"]:hover, .btn:hover {
            background: var(--gray-700);
            border-color: var(--gray-700);
            color: var(--white);
        }
        
        .btn-secondary, button.secondary, [role="button"].secondary {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border-strong);
        }
        
        .btn-secondary:hover, button.secondary:hover, [role="button"].secondary:hover {
            background: var(--gray-100);
            color: var(--text);
        }
        
        .btn-outline, button.outline, [role="button"].outline {
            background: transparent;
            color: var(--text);
            border-color: var(--border-strong);
        }
        
        .btn-outline:hover, button.outline:hover, [role="button"].outline:hover {
            background: var(--gray-100);
        }
        
        .btn-sm {
            padding: var(--space-1) var(--space-2);
            font-size: var(--text-xs);
        }
        
        /* Forms */
        label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text);
            margin-bottom: var(--space-1);
        }
        
        input, select, textarea {
            width: 100%;
            padding: var(--space-2) var(--space-3);
            font-size: var(--text-sm);
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--gray-900);
        }
        
        input[type="checkbox"] {
            width: auto;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-4);
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filters label {
            margin-bottom: 0;
        }
        
        .filters input,
        .filters select {
            margin-top: var(--space-1);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            gap: var(--space-1);
            justify-content: center;
            margin-top: var(--space-4);
        }
        
        .pagination a,
        .pagination span {
            padding: var(--space-2) var(--space-3);
            font-size: var(--text-sm);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }
        
        .pagination a:hover {
            background: var(--gray-100);
        }
        
        .pagination .active {
            background: var(--gray-900);
            color: var(--white);
            border-color: var(--gray-900);
        }
        
        /* Alerts */
        .alert {
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
            border: 1px solid var(--border);
        }
        
        .alert-success {
            background: var(--gray-100);
            border-color: var(--gray-400);
        }
        
        .alert-error {
            background: var(--gray-100);
            border-left: 3px solid var(--gray-900);
        }
        
        /* Error rows in preview */
        tr.has-errors {
            background: var(--gray-100);
        }
        
        .error-list {
            color: var(--gray-700);
            font-size: var(--text-xs);
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        /* Charts */
        .chart-container {
            background: var(--bg);
            padding: var(--space-4);
            border: 1px solid var(--border);
            margin-bottom: var(--space-6);
        }
        
        .chart-container h3 {
            font-size: var(--text-sm);
            font-weight: 500;
            margin-bottom: var(--space-4);
        }
        
        /* Loading indicator */
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
        
        /* User menu */
        .user-menu {
            margin-top: auto;
            padding-top: var(--space-4);
            border-top: 1px solid var(--border);
        }
        
        .user-menu small {
            display: block;
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-bottom: var(--space-2);
        }
        
        /* Monospace */
        .mono {
            font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
            font-size: var(--text-xs);
        }
        
        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }
        
        /* Card (generic container) */
        .card {
            background: var(--bg);
            padding: var(--space-4);
            border: 1px solid var(--border);
            margin-bottom: var(--space-4);
        }
        
        /* Utility */
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: var(--text-sm); }
        .text-xs { font-size: var(--text-xs); }
        .mb-0 { margin-bottom: 0; }
        .mb-4 { margin-bottom: var(--space-4); }
        .mt-4 { margin-top: var(--space-4); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">Toner Monitor</div>
            <nav>
                <ul>
                    <li><a href="/admin/" {% if request.url.path == '/admin/' %}class="active"{% endif %}>Dashboard</a></li>
                    
                    <div class="section-label">Products</div>
                    <li><a href="/admin/products" {% if '/products' in request.url.path and '/upload' not in request.url.path %}class="active"{% endif %}>Manage</a></li>
                    <li><a href="/admin/products/upload" {% if '/upload' in request.url.path %}class="active"{% endif %}>Bulk Upload</a></li>
                    
                    <div class="section-label">Analytics</div>
                    <li><a href="/admin/analytics/orders" {% if '/orders' in request.url.path and '/by-item' not in request.url.path %}class="active"{% endif %}>Order History</a></li>
                    <li><a href="/admin/analytics/orders-by-item" {% if '/orders-by-item' in request.url.path %}class="active"{% endif %}>Orders by Item</a></li>
                    <li><a href="/admin/analytics/spending" {% if '/spending' in request.url.path %}class="active"{% endif %}>Spending</a></li>
                    <li><a href="/admin/analytics/profit" {% if '/profit' in request.url.path %}class="active"{% endif %}>Profit</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <small>{{ user }}</small>
                <a href="/admin/logout" class="btn btn-secondary btn-sm" style="width: 100%; text-align: center;">Logout</a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
